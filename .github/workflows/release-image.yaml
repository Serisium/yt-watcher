# Keeps ghcr.io/<owner>/yt-watcher:latest tracking yt-dlp's release version.
# Daily: check PyPI for a new yt-dlp release; if the matching image tag is not
# published yet, build and push :<ytdlp-version> and :latest.
# Manual runs can pin a version and/or force a rebuild of an existing tag
# (the path for shipping watcher code changes under the same yt-dlp version).
name: Release image

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "yt-dlp version to build (default: latest from PyPI)"
        required: false
      force:
        description: "Rebuild and push even if the tag already exists"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name and yt-dlp version
        id: meta
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY@L}" >> "$GITHUB_OUTPUT"
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -fsS https://pypi.org/pypi/yt-dlp/json | jq -r .info.version)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether tag is already published
        id: published
        run: |
          if docker manifest inspect "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notice
        if: steps.published.outputs.exists == 'true' && inputs.force != true
        run: echo "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }} already published; nothing to do."

      - uses: docker/setup-qemu-action@v3
        if: steps.published.outputs.exists == 'false' || inputs.force == true

      - uses: docker/setup-buildx-action@v3
        if: steps.published.outputs.exists == 'false' || inputs.force == true

      - name: Build and push
        if: steps.published.outputs.exists == 'false' || inputs.force == true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          build-args: |
            YTDLP_VERSION=${{ steps.meta.outputs.version }}
