name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Unit tests
        run: pytest

  container-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve current yt-dlp version
        id: ytdlp
        run: echo "version=$(curl -fsS https://pypi.org/pypi/yt-dlp/json | jq -r .info.version)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: false
          load: true
          tags: yt-watcher:ci
          build-args: |
            YTDLP_VERSION=${{ steps.ytdlp.outputs.version }}
      - name: Entrypoint smoke test
        run: docker run --rm yt-watcher:ci --help
